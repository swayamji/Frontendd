<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-white">

<div class="container py-4">
    <h1 class="text-center mb-4">Smart To-Do Manager</h1>
 
    <div class="card p-3 bg-white">
        <input id="taskInput" type="text" class="form-control mb-2 border-black " placeholder="Enter task">

        <select id="priorityInput" class="form-select mb-2 border-black ">
            <option value="">Select Priority</option>
            <option value="3" class="bg-danger">High</option>
            <option value="2" class="bg-warning">Medium </option>
            <option value="1" class="bg-info">Low</option>
        </select>

        <input id="dateInput" type="date" class="form-control mb-2 border-black ">

        <button id="addTaskBtn" class="btn bg-black text-white">Add Task</button>
    </div>

    <div class="mt-3 d-flex gap-2">
        <button class="btn btn-outline-light filter" data-type="all">All</button>
        <button class="btn btn-outline-success filter" data-type="completed">Completed</button>
        <button class="btn btn-outline-warning filter" data-type="pending">Pending</button>
    </div>

    <div class="mt-3 d-flex gap-2">
        <button id="sortPriority" class="btn btn-info">Sort by Priority</button>
        <button id="sortDate" class="btn btn-info">Sort by Deadline</button>
    </div>

    <div class="mt-3">
        <span>Total: <span id="totalCount">0</span></span> |
        <span>Completed: <span id="completedCount">0</span></span> |
        <span>Pending: <span id="pendingCount">0</span></span>
    </div>

    <div id="taskList" class="mt-4"></div>

</div>

<script src="script.js"></script>
</body>
</html>
